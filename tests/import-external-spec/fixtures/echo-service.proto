syntax = "proto3";

package echo;

service EchoService {
  // Unary RPC
  rpc Echo (EchoRequest) returns (EchoResponse);
  // Server-streaming RPC
  rpc StreamEcho (EchoRequest) returns (stream EchoResponse);
}

message EchoRequest {
  string message = 1;
  int32 repeat = 2;
}

message EchoResponse {
  string message = 1;
  int32 count = 2;
}
